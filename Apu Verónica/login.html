<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apu Verónica — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { font-size: 1.4rem; color: #8B1A1A; }
    .logo p  { font-size: .85rem; color: #666; margin-top: .25rem; }
    label { display: block; font-size: .85rem; color: #444; margin-bottom: .35rem; }
    input[type="email"],
    input[type="password"] {
      width: 100%; padding: .65rem .85rem;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: .95rem; margin-bottom: 1rem;
      transition: border .2s;
    }
    input:focus { outline: none; border-color: #8B1A1A; }
    .btn {
      width: 100%; padding: .75rem;
      background: #8B1A1A; color: #fff;
      border: none; border-radius: 6px;
      font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #a52020; }
    .msg { margin-top: .85rem; text-align: center; font-size: .875rem; color: #c0392b; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🏔 Apu Verónica</h1>
    <p>Panel de Administración</p>
  </div>
  <form id="frmLogin">
    <label>Correo electrónico</label>
    <input type="email" id="email" required placeholder="admin@apuveronica.pe">
    <label>Contraseña</label>
    <input type="password" id="pwd" required placeholder="••••••••">
    <button type="submit" class="btn">Ingresar</button>
    <div class="msg" id="msg"></div>
  </form>
</div>
<script>
  document.getElementById('frmLogin').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.textContent = 'Verificando...';
    const res  = await fetch('auth.php', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        email: document.getElementById('email').value,
        pwd  : document.getElementById('pwd').value
      })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = 'admin/dashboard.php';
    } else {
      msg.textContent = data.error || 'Credenciales incorrectas.';
    }
  });
</script>
</body>
</html>
